<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كافيه العز</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --black: #000000; }
        body { 
            font-family: 'Tajawal', sans-serif; background-color: var(--black); color: var(--gold); 
            display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; min-height: 100vh; 
        }
        h1 { font-size: 45px; margin-bottom: 20px; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        
        .hero-img { 
            width: 100%; max-width: 500px; border-radius: 20px; border: 2px solid var(--gold); 
            height: 250px; object-fit: cover; margin-bottom: 20px; 
        }

        .order-container { 
            background: var(--gold); color: #000; width: 100%; max-width: 500px; 
            padding: 30px; border-radius: 25px; text-align: center; box-sizing: border-box; 
        }

        input { 
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #000; 
            margin-top: 15px; font-family: 'Tajawal'; font-weight: bold; text-align: center; box-sizing: border-box; 
        }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-send { flex: 2; background: #000; color: var(--gold); padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 18px; }
        .btn-back { flex: 1; background: #555; color: #fff; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* صندوق الرد الاحترافي */
        #ai-reply-box { 
            display: none; margin-top: 20px; padding: 20px; background: #fff; color: #000; 
            border-radius: 20px; border: 4px solid #000; font-weight: bold; line-height: 1.6;
        }

        .footer { margin-top: 30px; font-size: 12px; opacity: 0.4; text-align: center; }
    </style>
</head>
<body>

    <h1>كـافـيـه الـعـز</h1>

    <img src="https://images.unsplash.com/photo-1447933601403-0c6688de566e?q=80&w=1000&auto=format&fit=crop" class="hero-img">

    <div class="order-container">
        <h3 style="margin:0">اطلب عبر ذكاء العز 🤖</h3>
        <input type="text" id="userInput" placeholder="وش طلبك؟" onkeypress="if(event.key==='Enter') startAsk()">
        
        <div class="btn-group">
            <button class="btn-send" onclick="startAsk()">إرسال الطلب</button>
            <button class="btn-back" onclick="clearEverything()">الرجوع ↩️</button>
        </div>

        <div id="ai-reply-box" onclick="clearEverything()">
            <div id="ai-text"></div>
            <div style="font-size: 11px; color: #999; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px;">(اضغط هنا للمسح والرجوع)</div>
        </div>
    </div>

    <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1000&auto=format&fit=crop" class="hero-img" style="margin-top:30px;">

    <div class="footer">كافيه العز © 2026</div>

    <script>
        // وظيفة الإرسال للـ n8n
        async function startAsk() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('ai-reply-box');
            const text = document.getElementById('ai-text');

            if (!input.value.trim()) return;

            // إظهار الصندوق فوراً
            box.style.display = "block";
            text.innerText = "⏳ جاري التجهيز...";

            try {
                const response = await fetch('https://voxa-3a7ac828dfb6.herokuapp.com/webhook/f679c772-d169-4e46-a1cd-35bd223dc4b6', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatInput: input.value })
                });
                const data = await response.json();
                text.innerText = data.output || data.text || "تم استلام طلبك يا بطل!";
            } catch (e) {
                text.innerText = "أبشر، طلبك وصل!";
            }
        }

        // وظيفة الرجوع والمسح (الحل الجذري)
        function clearEverything() {
            // 1. إخفاء الصندوق تماماً
            document.getElementById('ai-reply-box').style.display = "none";
            // 2. مسح الكلام اللي كتبه المستخدم
            document.getElementById('userInput').value = "";
            // 3. مسح أي نص قديم في الرد
            document.getElementById('ai-text').innerText = "";
            
            console.log("تم تصفير الواجهة بنجاح");
        }
    </script>
</body>
</html>
