<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كافيه العز - ذكاء اصطناعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #000000; /* خلفية سوداء ملكية */
            color: #FFD700; /* كلام ذهبي ملكي للواجهة */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        h1 {
            color: #FFD700;
            border-bottom: 2px solid #FFD700;
            padding-bottom: 15px;
            margin-bottom: 50px;
            margin-top: 40px; /* مسافة إضافية بدل الشعار */
            font-size: 32px;
            font-weight: 700;
        }

        .menu-container { width: 100%; max-width: 400px; margin-bottom: 40px; }
        .menu-item { 
            background: #111; /* خلفية قائمة داكنة */
            padding: 20px; 
            margin: 15px 0; 
            display: flex; 
            justify-content: space-between; 
            border: 1px solid #FFD700; 
            font-weight: bold;
            border-radius: 15px;
            font-size: 18px;
        }

        /* تنسيق صندوق المحادثة الذهبي الملكي */
        .chat-box { 
            background: #FFD700; /* صندوق المحادثة ذهبي الملكي */
            color: #000000; /* الكلام داخل الصندوق أسود فخم */
            width: 90%; 
            max-width: 440px; 
            padding: 30px; 
            border-radius: 30px; 
            text-align: center; 
            box-shadow: 0 18px 45px rgba(255, 215, 0, 0.3);
            margin-bottom: 30px;
        }

        h3 {
            margin-top: 0;
            font-size: 22px;
            margin-bottom: 25px;
            font-weight: 700;
        }

        /* تنسيق حقل الإدخال */
        input { 
            width: 88%; 
            padding: 16px; 
            border: 2px solid #000; 
            background: #fff; 
            color: #000; 
            border-radius: 15px; 
            margin-top: 15px; 
            text-align: center;
            font-size: 17px;
            font-weight: bold;
        }

        /* تنسيق زر الإرسال الأسود */
        button { 
            background: #000000; /* زر أسود فخم */
            color: #FFD700; /* كلام ذهبي على الزر */
            border: none; 
            padding: 16px; 
            border-radius: 15px; 
            margin-top: 25px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%;
            font-size: 19px;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #222; /* تأثير خفيف عند تمرير الماوس */
        }

        #ai-reply { 
            margin-top: 25px; 
            font-size: 17px; 
            font-weight: bold; 
            line-height: 1.8; 
            color: #000; /* رد الذكاء بالأسود داخل الصندوق الذهبي */
            white-space: pre-wrap; /* للحفاظ على تنسيق الأسطر */
        }

        .footer { margin-top: auto; padding: 30px; font-size: 14px; opacity: 0.7; text-align: center; width: 100%; }
    </style>
</head>
<body>

    <h1>كـافـيـه الـعـز</h1>

    <div class="menu-container">
        <div class="menu-item"><span>🥤 مشروب المليون</span> <span>15 SR</span></div>
        <div class="menu-item)<span>☕ لاتيه الذكاء</span> <span>18 SR</span></div>
        <div class="menu-item"><span>🍰 كيكة الألوان</span> <span>22 SR</span></div>
    </div>

    <div class="chat-box">
        <h3>اسأل ذكاء العز 🤖</h3>
        <input type="text" id="userInput" placeholder="اكتب سؤالك واضغط Enter" onkeypress="handleKeyPress(event)">
        <button onclick="askAI()">إرسال الطلب ☕</button>
        <div id="ai-reply">يا هلا بك.. وش بخاطرك اليوم؟</div>
    </div>

    <div class="footer">جميع الحقوق محفوظة لأسرة العز © 2026</div>

<script>
    // وظيفة لإرسال الرسالة عند الضغط على Enter
    function handleKeyPress(event) { if (event.key === "Enter") { askAI(); } }

    async function askAI() {
        const inputField = document.getElementById('userInput');
        const replyDiv = document.getElementById('ai-reply');
        const userText = inputField.value;
        if (!userText) return;

        replyDiv.innerText = "⏳ ذكاء العز يجهز الرد الفخم...";
        inputField.value = "";

        try {
            // استخدام رابط الـ test ليطابق n8n حالياً
            const response = await fetch('https://voxa-3a7ac828dfb6.herokuapp.com/webhook/f679c772-d169-4e46-a1cd-35bd223dc4b6', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatInput: userText })
            });

            if (!response.ok) throw new Error('Network response was not ok');

            const data = await response.json();
            console.log("الرد الواصل:", data);
            
            // قراءة الرد من n8n
            let output = "";
            if (Array.isArray(data)) {
                output = data[0].output || data[0].text || "آمرنا؟ جرب تسأل مرة ثانية";
            } else {
                output = data.output || data.text || "آمرنا؟ جرب تسأل مرة ثانية";
            }

            replyDiv.innerText = output;

        } catch (error) {
            console.error(error);
            replyDiv.innerText = "❌ فشل الاتصال. تأكد أن n8n فعال (Active) والمفتاح أخضر";
        }
    }
</script>
</body>
</html>
