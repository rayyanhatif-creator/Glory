<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كافيه العز</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --black: #000000; }
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--black); 
            color: var(--gold); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 20px; 
        }

        /* نص الترحيب الكبير */
        .welcome-text {
            font-size: 42px; 
            font-weight: 700;
            margin-top: 20px;
            margin-bottom: 10px;
            text-align: center;
        }

        /* الصورة (البن والقهوة) */
        .hero-img {
            width: 100%;
            max-width: 450px;
            height: 250px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            object-fit: cover;
            margin-bottom: 20px;
        }

        /* المنيو */
        .menu-container { width: 100%; max-width: 400px; }
        .menu-item { 
            background: #111; 
            padding: 15px; 
            margin: 10px 0; 
            display: flex; 
            justify-content: space-between; 
            border: 1px solid var(--gold); 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold;
        }

        /* صندوق الطلب */
        .chat-box { 
            background: var(--gold); 
            color: #000; 
            width: 100%; 
            max-width: 400px; 
            padding: 25px; 
            border-radius: 25px; 
            margin-top: 20px;
            text-align: center;
            box-sizing: border-box;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #000; 
            border-radius: 10px; 
            margin-top: 10px; 
            box-sizing: border-box;
            font-family: 'Tajawal';
            font-weight: bold;
            text-align: center;
        }

        button { 
            background: #000; 
            color: var(--gold); 
            border: none; 
            padding: 12px; 
            border-radius: 10px; 
            margin-top: 15px; 
            width: 100%; 
            font-weight: bold; 
            font-size: 18px;
            cursor: pointer;
        }

        #ai-reply { margin-top: 15px; font-weight: bold; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="welcome-text">كافيه العز يرحب بكم</div>

    <img src="https://images.unsplash.com/photo-1559496417-e7f25cb247f3?q=80&w=1000&auto=format&fit=crop" class="hero-img" alt="قهوة العز">

    <div class="menu-container">
        <div class="menu-item"><span>🥤 مشروب المليون</span> <span>15 SR</span></div>
        <div class="menu-item"><span>☕ لاتيه الذكاء</span> <span>18 SR</span></div>
        <div class="menu-item"><span>🍰 كيكة الألوان</span> <span>22 SR</span></div>
    </div>

    <div class="chat-box">
        <h3 style="margin:0">اسأل ذكاء العز 🤖</h3>
        <input type="text" id="userInput" placeholder="وش بخاطرك تطلب؟" onkeypress="if(event.key==='Enter') askAI()">
        <button onclick="askAI()">إرسال الطلب ✨</button>
        <div id="ai-reply">يا هلا بك.. آمر وتدلل 🤩</div>
    </div>

    <p style="margin-top:30px; font-size:12px; opacity:0.5">حقوق كافيه العز © 2026</p>

<script>
    async function askAI() {
        const input = document.getElementById('userInput');
        const reply = document.getElementById('ai-reply');
        if (!input.value) return;

        reply.innerText = "⏳ يجهز الرد...";
        const text = input.value;
        input.value = "";

        try {
            const res = await fetch('https://voxa-3a7ac828dfb6.herokuapp.com/webhook/f679c772-d169-4e46-a1cd-35bd223dc4b6', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatInput: text })
            });
            const data = await res.json();
            reply.innerText = data.output || data.text || "آمرنا؟ جرب مرة ثانية";
        } catch (e) {
            reply.innerText = "❌ فشل الاتصال بالباريستا";
        }
    }
</script>
</body>
</html>
