<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو كافيه العز الذكي 🟡</title>
    <style>
        body { background-color: #f1c40f; color: #000; font-family: 'Arial', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; }
        .menu-card { background: #fff; border: 3px solid #000; border-radius: 15px; padding: 15px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; font-weight: bold; box-shadow: 5px 5px 0px #000; }
        .ai-section { background: #000; color: #f1c40f; padding: 25px; border-radius: 20px; margin-top: 30px; }
        input { width: 85%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 15px; font-size: 1rem; }
        button { background: #f1c40f; color: #000; padding: 10px 25px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        #ai-reply { margin-top: 15px; line-height: 1.6; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>كافيه العز 🟡</h1>
        <div class="menu-card"><span>🥤 مشروب المليون</span><span>15 SR</span></div>
        <div class="menu-card"><span>☕ لاتيه الذكاء</span><span>18 SR</span></div>
        <div class="menu-card"><span>🍰 كيكة الألوان</span><span>22 SR</span></div>
        <div class="ai-section">
            <h3>🤖 باريستا كافيه العز الذكي</h3>
            <input type="text" id="userInput" placeholder="وش تنصحني أطلب؟">
            <button id="sendBtn" onclick="askAI()">إرسال الطلب</button>
            <div id="ai-reply"></div>
        </div>
    </div>

    <script>
        async function askAI() {
            const inputField = document.getElementById('userInput');
            const replyDiv = document.getElementById('ai-reply');
            const userText = inputField.value;

            if(!userText) return;

            // --- السر هنا: المسح الفوري قبل الإرسال ---
            inputField.value = ""; 
            
            replyDiv.innerText = "جاري استشارة باريستا العز... ⏳";
            
            try {
                const response = await fetch(https://voxa-3a7ac828dfb6.herokuapp.com/webhook/5fd4928d-a896-4846-bcad-853ea3ff0c65', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatInput: userText })
                });

                const data = await response.json();
                
                // عرض رد الذكاء الاصطناعي فقط بدون تكرار كلامك
                replyDiv.innerText = data.output || "أبشر بالسعد، طلبك مدروس!";
                
            } catch (error) {
                console.error("Error:", error);
                replyDiv.innerText = "الباريستا مشغول، بس نصيحته لك: خذ المنيو كامل من العز!";
            }
        }
    </script>
</body>
</html>
