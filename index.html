<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كافيه العز - ذكاء اصطناعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #000000; 
            color: #FFD700; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        h1 {
            color: #FFD700;
            border-bottom: 2px solid #FFD700;
            padding-bottom: 15px;
            margin-bottom: 40px;
            margin-top: 50px; 
            font-size: 32px;
            font-weight: 700;
        }

        .menu-container { 
            width: 100%; 
            max-width: 400px; 
            margin-bottom: 40px; 
        }
        .menu-item { 
            background: #111; 
            padding: 18px; 
            margin: 12px 0; 
            display: flex; 
            justify-content: space-between; 
            border: 1px solid #FFD700; 
            font-weight: bold;
            border-radius: 12px;
            font-size: 18px;
        }

        /* تعديل الصندوق الأصفر ليكون كل شيء في النص */
        .chat-box { 
            background: #FFD700; 
            color: #000000; 
            width: 90%; 
            max-width: 440px; 
            padding: 30px; 
            border-radius: 30px; 
            display: flex;
            flex-direction: column;
            align-items: center; /* يخلي كل المحتوى في النص */
            text-align: center; 
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.3);
            box-sizing: border-box; /* يضمن الأبعاد تكون دقيقة */
        }

        input { 
            width: 100%; /* تعديل العرض ليتناسب مع الحاوية */
            max-width: 380px;
            padding: 14px; 
            border: 2px solid #000; 
            border-radius: 12px; 
            margin-top: 15px; 
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Tajawal', sans-serif;
        }

        button { 
            background: #000000; 
            color: #FFD700; 
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            margin-top: 20px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%;
            max-width: 380px;
            font-size: 18px;
        }

        #ai-reply { 
            margin-top: 20px; 
            font-size: 17px; 
            font-weight: bold; 
            line-height: 1.7; 
            width: 100%;
            text-align: center; /* يضمن سنترة رد الذكاء */
        }

        .footer { margin-top: auto; padding: 25px; font-size: 13px; opacity: 0.7; }
    </style>
</head>
<body>

    <h1>كـافـيـه الـعـز</h1>

    <div class="menu-container">
        <div class="menu-item"><span>🥤 مشروب المليون</span> <span>15 SR</span></div>
        <div class="menu-item"><span>☕ لاتيه الذكاء</span> <span>18 SR</span></div>
        <div class="menu-item"><span>🍰 كيكة الألوان</span> <span>22 SR</span></div>
    </div>

    <div class="chat-box">
        <h3>اسأل ذكاء العز 🤖</h3>
        <input type="text" id="userInput" placeholder="اكتب سؤالك واضغط Enter" onkeypress="handleKeyPress(event)">
        <button onclick="askAI()">إرسال الطلب ☕</button>
        <div id="ai-reply">يا هلا بك.. وش بخاطرك اليوم؟</div>
    </div>

    <div class="footer">جميع الحقوق محفوظة لأسرة العز © 2026</div>

<script>
    function handleKeyPress(event) { if (event.key === "Enter") { askAI(); } }

    async function askAI() {
        const inputField = document.getElementById('userInput');
        const replyDiv = document.getElementById('ai-reply');
        const userText = inputField.value;
        if (!userText) return;

        replyDiv.innerText = "⏳ يجهز الرد الفخم...";
        inputField.value = "";

        try {
            const response = await fetch('https://voxa-3a7ac828dfb6.herokuapp.com/webhook/f679c772-d169-4e46-a1cd-35bd223dc4b6', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatInput: userText })
            });

            const data = await response.json();
            let output = data.output || data.text || (Array.isArray(data) && data[0].output) || "آمرنا؟ جرب تسأل مرة ثانية";
            
            replyDiv.innerText = output;

        } catch (error) {
            replyDiv.innerText = "❌ فشل الاتصال. تأكد من تشغيل n8n.";
        }
    }
</script>
</body>
</html>
