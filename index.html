<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كافيه العز الفاخر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #000000;
            color: #FFD700;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        .header h1 {
            color: #FFD700;
            font-size: 2.8rem;
            margin-bottom: 25px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .menu-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        .menu-item {
            background: #000;
            padding: 18px;
            margin: 12px 0;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #FFD700;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.1);
        }

        .chat-container {
            width: 100%;
            max-width: 400px;
            background: #000;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid #FFD700;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .chat-container h3 {
            margin-top: 0;
            color: #FFD700;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 90%;
            padding: 12px;
            background: #111;
            border: 1px solid rgba(255, 215, 0, 0.4);
            color: #FFD700;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 15px;
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #FFD700;
        }

        button {
            background: #FFD700;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 95%;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        button:hover {
            background: #e6c200;
            transform: translateY(-2px);
        }

        #ai-reply {
            margin-top: 20px;
            color: #FFD700;
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.6;
        }

        .footer {
            margin-top: auto;
            padding: 30px;
            font-size: 0.9rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>كافيه العز</h1>
    </div>

    <div class="menu-container">
        <div class="menu-item"><span>🥤 مشروب المليون</span> <span>15 SR</span></div>
        <div class="menu-item"><span>☕ لاتيه الذكاء</span> <span>18 SR</span></div>
        <div class="menu-item"><span>🍰 كيكة الألوان</span> <span>22 SR</span></div>
    </div>

    <div class="chat-container">
        <h3>اسأل ذكاء العز 🤖</h3>
        <input type="text" id="userInput" placeholder="وش تنصحني أطلب اليوم؟">
        <button onclick="askAI()">إرسال الطلب ☕</button>
        <div id="ai-reply">يا هلا بك في كافيه العز.. تفضل اسأل؟</div>
    </div>

    <div class="footer">
        جميع الحقوق محفوظة لأسرة العز © 2026
    </div>

<script>
    async function askAI() {
        const inputField = document.getElementById('userInput');
        const replyDiv = document.getElementById('ai-reply');
        const userText = inputField.value;
        if (!userText) return;

        replyDiv.innerText = "⏳ جاري استشارة الباريستا...";
        inputField.value = "";

        try {
            // استخدام رابط الـ Webhook الجديد الخاص بك
            const response = await fetch('https://voxa-3a7ac828dfb6.herokuapp.com/webhook-test/f679c772-d169-4e46-a1cd-35bd223dc4b6', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatInput: userText })
            });

            const data = await response.json();
            
            // عرض الرد أو رسالة خطأ ٣٣٣
            if (data && data.output) {
                replyDiv.innerText = data.output;
            } else {
                replyDiv.innerText = "خطأ ٣٣٣";
            }
            
        } catch (error) {
            console.error("Error:", error);
            replyDiv.innerText = "خطأ ٣٣٣";
        }
    }
</script>
</body>
</html>
