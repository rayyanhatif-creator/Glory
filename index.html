<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>موقع كفي العز</title>
    <style>
        body {
            background-color: yellow;
            color: black;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }

        h1 {
            font-size: 40px;
        }

        button {
            background-color: black;
            color: yellow;
            padding: 15px 25px;
            font-size: 18px;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }

        input {
            padding: 10px;
            width: 300px;
            font-size: 16px;
        }

        #response {
            margin-top: 20px;
            font-size: 18px;
        }

        footer {
            margin-top: 60px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>🔥 موقع كفي العز 🔥</h1>
    <p>نظام ذكي يعمل بالذكاء الاصطناعي عبر n8n</p>

    <input type="text" id="userInput" placeholder="اكتب طلبك هنا">
    <br>
    <button onclick="sendRequest()">إرسال</button>

    <p id="response"></p>

    <footer>
        جميع الحقوق محفوظة لأسرة العز
    </footer>

    <script>
        function sendRequest() {
            const input = document.getElementById("userInput").value;

            fetch("https://voxa-3a7ac828dfb6.herokuapp.com/webhook-test/5fd4928d-a896-4846-bcad-853ea3ff0c65", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: input })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("response").innerText = data.reply || JSON.stringify(data);
            })
            .catch(error => {
                document.getElementById("response").innerText = "❌ صار خطأ في الاتصال";
            });
        }
    </script>

</body>
</html>
