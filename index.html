<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كافيه العز | تجربة الذكاء</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #FFD700;
            --dark-bg: #000000;
            --card-bg: #111111;
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--dark-bg); 
            color: var(--primary-gold); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 0; 
            margin: 0; 
            min-height: 100vh; 
        }

        /* 1. قسم الواجهة الترحيبية (صورة الكارت) */
        .intro-section {
            width: 100%;
            height: 100vh; /* تأخذ كامل طول الشاشة */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f7; /* نفس خلفية صورتك */
        }
        
        .intro-card {
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 20px;
            overflow: hidden;
        }
        
        /* هنا نربط صورة الكارت اللي أرسلتها ( intro_card.png ) */
        .intro-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 2. قسم صورة القهوة الرئيسية (Hero Image) */
        .coffee-hero {
            width: 100%;
            height: 60vh; /* تأخذ 60% من طول الشاشة */
            /* هنا نربط صورة القهوة الفخمة ( coffee_hero.jpg ) */
            background-image: url('coffee_hero.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }
        
        /* تظليل أسود خفيف فوق الصورة عشان يبان النص */
        .coffee-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
        }
        
        .coffee-hero-text {
            position: relative;
            z-index: 1;
            color: var(--primary-gold);
            font-size: 32px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            margin-top: 15vh; /* نزلنا النص تحت شوي عشان يكون سنتر */
            text-align: center;
        }

        /* العنوان الرئيسي */
        h1 { 
            color: var(--primary-gold); 
            border-bottom: 2px solid var(--primary-gold); 
            padding-bottom: 15px; 
            margin-bottom: 20px; 
            margin-top: 60px; /* نزلناه عشان ما يلصق في صورة القهوة */
            font-size: 36px; 
            font-weight: 700; 
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
            text-align: center;
        }

        /* 3. قسم المنيو (المنتجات) */
        .menu-container { 
            width: 100%; 
            max-width: 450px; 
            margin-bottom: 40px; 
            padding: 0 20px; /* حماية للجوانب في الجوال */
        }
        
        .menu-item { 
            background: var(--card-bg); 
            padding: 20px; 
            margin: 15px 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border: 1px solid var(--primary-gold); 
            border-radius: 15px; 
            font-weight: bold; 
            font-size: 20px; 
            transition: transform 0.3s ease;
        }
        
        .menu-item:hover {
            transform: scale(1.02);
        }

        .price {
            color: #fff;
            background: rgba(255, 215, 0, 0.1);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 16px;
        }

        /* 4. قسم الطلب (صندوق المحادثة الذهبي) */
        .chat-box { 
            background: var(--primary-gold); 
            color: #000; 
            width: 95%; 
            max-width: 450px; 
            padding: 35px; 
            border-radius: 35px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center; 
            box-shadow: 0 20px 50px rgba(255, 215, 0, 0.25);
            box-sizing: border-box;
            margin-bottom: 60px; /* مسافة قبل الـ Footer */
        }

        .chat-box h3 {
            margin-top: 0;
            font-size: 24px;
            margin-bottom: 25px;
        }

        input { 
            width: 100%; 
            padding: 16px; 
            border: 2px solid #000; 
            border-radius: 15px; 
            margin-top: 10px; 
            text-align: center; 
            font-size: 18px; 
            font-weight: bold; 
            font-family: 'Tajawal', sans-serif;
            outline: none;
            box-sizing: border-box;
        }

        button { 
            background: #000; 
            color: var(--primary-gold); 
            border: none; 
            padding: 16px; 
            border-radius: 15px; 
            margin-top: 20px; 
            cursor: pointer; 
            font-weight: 700; 
            width: 100%; 
            font-size: 20px; 
            transition: all 0.3s ease;
        }

        button:hover {
            background: #222;
        }

        #ai-reply { 
            margin-top: 25px; 
            font-size: 18px; 
            font-weight: 700; 
            line-height: 1.8; 
            width: 100%;
            text-align: center;
            white-space: pre-wrap;
        }

        .footer { 
            margin-top: auto; 
            padding: 30px; 
            font-size: 14px; 
            opacity: 0.6; 
            color: #fff;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="intro-section">
        <div class="intro-card">
            <img src="intro_card.png" alt="كارت العز للترحيب">
        </div>
    </div>

    <div class="coffee-hero">
        <div class="coffee-hero-text">استمتع بالكيف.. معنا</div>
    </div>

    <h1>قـائـمـة الـعـز</h1>

    <div class="menu-container">
        <div class="menu-item">
            <span>🥤 مشروب المليون</span> 
            <span class="price">15 SR</span>
        </div>
        <div class="menu-item">
            <span>☕ لاتيه الذكاء</span> 
            <span class="price">18 SR</span>
        </div>
        <div class="menu-item">
            <span>🍰 كيكة الألوان</span> 
            <span class="price">22 SR</span>
        </div>
    </div>

    <div class="chat-box">
        <h3>اسأل ذكاء العز 🤖✨</h3>
        <input type="text" id="userInput" placeholder="اطلب اللي بخاطرك هنا..." onkeypress="handleKeyPress(event)">
        <button onclick="askAI()">إرسال الطلب ☕🔥</button>
        <div id="ai-reply">يا هلا بضيف العز.. وش ودك نقهويك اليوم؟ 🤩</div>
    </div>

    <div class="footer">جميع الحقوق محفوظة لأسرة العز © 2026</div>

<script>
    function handleKeyPress(event) { if (event.key === "Enter") { askAI(); } }

    async function askAI() {
        const inputField = document.getElementById('userInput');
        const replyDiv = document.getElementById('ai-reply');
        const userText = inputField.value;
        if (!userText) return;

        replyDiv.innerText = "⏳ يجهز الرد الفخم... ✨";
        inputField.value = "";

        try {
            // تأكد من رابط الـ Webhook حقك في n8n
            const response = await fetch('https://voxa-3a7ac828dfb6.herokuapp.com/webhook/f679c772-d169-4e46-a1cd-35bd223dc4b6', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatInput: userText })
            });

            const data = await response.json();
            let output = data.output || data.text || (Array.isArray(data) && data[0].output) || "آمرنا؟ جرب تسأل مرة ثانية ☕";
            
            replyDiv.innerText = output;

        } catch (error) {
            replyDiv.innerText = "❌ فشل الاتصال. تأكد أن n8n فعال (Active) والمفتاح أخضر";
        }
    }
</script>
</body>
</html>
