<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <style>
        /* تعريف الألوان والمتغيرات - كل النصوص الحين ذهبية */
        :root {
            --primary-color: #FFD700; /* ذهبي فاقع للنصوص والعناصر */
            --secondary-color: #DAA520; /* ذهبي داكن للزر */
            --bg-color: #050505; /* أسود ملكي */
            --text-color: #FFD700; /* تغيير النص الرئيسي للذهبي */
            --chat-bg: rgba(10, 10, 10, 0.9); /* أسود شفاف للمحادثة */
            --glass-effect: blur(10px) saturate(180%);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color); /* كل النصوص ذهبية */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* تأثير خلفية متحركة خفيفة */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(218, 165, 32, 0.08) 0%, rgba(5, 5, 5, 0) 70%);
            z-index: -1;
        }

            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out;
        }
