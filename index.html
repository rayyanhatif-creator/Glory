<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كافيه العز</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --black: #000000; }
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--black); 
            color: var(--gold); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 10px; 
            scroll-behavior: smooth; /* عشان النزلة للطلب تكون ناعمة */
        }

        .welcome-text {
            font-size: 36px; 
            font-weight: 700;
            margin-top: 15px;
            margin-bottom: 15px;
            text-align: center;
        }

        /* جعل الصورة قابلة للضغط */
        .hero-link { width: 100%; max-width: 450px; cursor: pointer; }
        
        .hero-img {
            width: 100%;
            height: 220px;
            border-radius: 15px;
            border: 2px solid var(--gold);
            object-fit: cover;
            transition: transform 0.2s;
        }

        .hero-img:active { transform: scale(0.98); }

        .menu-container { width: 100%; max-width: 400px; margin-top: 15px; }
        
        .menu-item { 
            background: #111; 
            padding: 12px 15px; 
            margin: 8px 0; 
            display: flex; 
            justify-content: space-between; 
            border: 1px solid var(--gold); 
            border-radius: 10px; 
            font-size: 17px; 
            font-weight: bold;
        }

        /* صندوق الطلب الجديد */
        .chat-box { 
            background: var(--gold); 
            color: #000; 
            width: 100%; 
            max-width: 400px; 
            padding: 20px; 
            border-radius: 20px; 
            margin-top: 20px;
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.2);
        }

        input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #000; 
            border-radius: 10px; 
            margin-top: 10px; 
            box-sizing: border-box;
            font-family: 'Tajawal';
            font-weight: bold;
            text-align: center;
            font-size: 16px;
        }

        button { 
            background: #000; 
            color: var(--gold); 
            border: none; 
            padding: 12px; 
            border-radius: 10px; 
            margin-top: 15px; 
            width: 100%; 
            font-weight: bold; 
            font-size: 18px;
            cursor: pointer;
        }

        #ai-reply { margin-top: 15px; font-weight: bold; font-size: 17px; }
    </style>
</head>
<body>

    <div class="welcome-text">كافيه العز يرحب بكم</div>

    <a href="#order-section" class="hero-link">
        <img src="https://images.unsplash.com/photo-1559496417-e7f25cb247f3?q=80&w=1000&auto=format&fit=crop" class="hero-img" alt="اضغط للطلب">
    </a>

    <div class="menu-container">
        <div class="menu-item"><span>🥤 مشروب المليون</span> <span>15 SR</span></div>
        <div class="menu-item"><span>☕ لاتيه الذكاء</span> <span>18 SR</span></div>
        <div class="menu-item"><span>🍰 كيكة الألوان</span> <span>22 SR</span></div>
    </div>

    <div class="chat-box" id="order-section">
        <h3 style="margin:0">اطلب من العز ☕✨</h3>
        <input type="text" id="userInput" placeholder="وش تبي نجهز لك؟" onkeypress="if(event.key==='Enter') askAI()">
        <button onclick="askAI()">إرسال الطلب</button>
        <div id="ai-reply">أبشر بسعدك.. وش طلبك؟ 🤩</div>
    </div>

    <p style="margin-top:20px; font-size:11px; opacity:0.5">جميع الحقوق محفوظة - كافيه العز © 2026</p>

<script>
    async function askAI() {
        const input = document.getElementById('userInput');
        const reply = document.getElementById('ai-reply');
        if (!input.value) return;

        reply.innerText = "⏳ جاري التجهيز...";
        const text = input.value;
        input.value = "";

        try {
            const res = await fetch('https://voxa-3a7ac828dfb6.herokuapp.com/webhook/f679c772-d169-4e46-a1cd-35bd223dc4b6', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatInput: text })
            });
            const data = await res.json();
            reply.innerText = data.output || data.text || "آمرنا؟ جرب مرة ثانية";
        } catch (e) {
            reply.innerText = "❌ الباريستا مشغول شوي، جرب بعد ثواني";
        }
    }
</script>
</body>
</html>
