<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كافيه العز الفاخر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #000000; /* خلفية سوداء ملكية */
            color: #FFD700; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        /* مكان الشعار */
        .logo-container {
            margin-top: 20px;
            width: 120px;
            height: 120px;
            border: 2px dashed #FFD700; /* إطار مؤقت للشعار */
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-bottom: 10px;
        }
        .logo-container img {
            width: 100%;
            border-radius: 50%;
        }

        h1 {
            color: #FFD700;
            border-bottom: 2px solid #FFD700;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .menu-container { width: 100%; max-width: 400px; margin-bottom: 30px; }
        .menu-item { 
            background: #111; 
            padding: 15px; 
            margin: 10px 0; 
            display: flex; 
            justify-content: space-between; 
            border: 1px solid #FFD700; 
            font-weight: bold;
            border-radius: 10px;
        }

        .chat-box { 
            background: #FFD700; /* صندوق المحادثة ذهبي */
            color: #000000; /* الكلام داخل الصندوق أسود */
            width: 90%; 
            max-width: 400px; 
            padding: 20px; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }

        input { 
            width: 85%; 
            padding: 12px; 
            border: 2px solid #000; 
            background: #fff; 
            color: #000; 
            border-radius: 10px; 
            margin-top: 10px; 
            text-align: center;
            font-size: 16px;
        }

        button { 
            background: #000000; 
            color: #FFD700; 
            border: none; 
            padding: 12px; 
            border-radius: 10px; 
            margin-top: 15px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%;
            font-size: 17px;
        }

        #ai-reply { 
            margin-top: 15px; 
            font-size: 16px; 
            font-weight: bold; 
            line-height: 1.6; 
            color: #000; /* رد الذكاء بالأسود داخل الصندوق الذهبي */
        }

        .footer { margin-top: auto; padding: 20px; font-size: 12px; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="logo-container">
        <span id="logo-text">شعار العز</span>
        </div>

    <h1>كـافـيـه الـعـز</h1>

    <div class="menu-container">
        <div class="menu-item"><span>🥤 مشروب المليون</span> <span>15 SR</span></div>
        <div class="menu-item"><span>☕ لاتيه الذكاء</span> <span>18 SR</span></div>
        <div class="menu-item"><span>🍰 كيكة الألوان</span> <span>22 SR</span></div>
    </div>

    <div class="chat-box">
        <h3 style="margin: 0;">اسأل ذكاء العز 🤖</h3>
        <input type="text" id="userInput" placeholder="اكتب سؤالك واضغط Enter" onkeypress="handleKeyPress(event)">
        <button onclick="askAI()">إرسال الطلب ☕</button>
        <div id="ai-reply">يا هلا بك.. وش بخاطرك اليوم؟</div>
    </div>

    <div class="footer">جميع الحقوق محفوظة لأسرة العز © 2026</div>

<script>
    // وظيفة لإرسال الرسالة عند الضغط على Enter
    function handleKeyPress(event) {
        if (event.key === "Enter") {
            askAI();
        }
    }

    async function askAI() {
        const inputField = document.getElementById('userInput');
        const replyDiv = document.getElementById('ai-reply');
        const userText = inputField.value;
        if (!userText) return;

        replyDiv.innerText = "⏳ ذكاء العز يجهز الرد...";
        inputField.value = "";

        try {
            const response = await fetch('https://voxa-3a7ac828dfb6.herokuapp.com/webhook/f679c772-d169-4e46-a1cd-35bd223dc4b6', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatInput: userText })
            });

            const data = await response.json();
            
            // قراءة الرد من n8n
            let output = data.output || (data[0] && data[0].output) || "آمرنا؟ جرب تسأل مرة ثانية";
            replyDiv.innerText = output;

        } catch (error) {
            replyDiv.innerText = "خطأ في الاتصال.. تأكد أن n8n Active";
        }
    }
</script>
</body>
</html>
