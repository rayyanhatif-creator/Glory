<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كافيه العز الفاخر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #000; color: #FFD700; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .logo-container { margin-top: 30px; width: 160px; height: 160px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; }
        .logo-container img { width: 100%; border-radius: 50%; box-shadow: 0 8px 25px rgba(255, 215, 0, 0.35); }
        h1 { color: #FFD700; border-bottom: 2px solid #FFD700; padding-bottom: 15px; margin-bottom: 45px; font-size: 30px; }
        .menu-container { width: 100%; max-width: 400px; margin-bottom: 40px; }
        .menu-item { background: #111; padding: 20px; margin: 15px 0; display: flex; justify-content: space-between; border: 1px solid #FFD700; border-radius: 15px; font-weight: bold; }
        .chat-box { background: #FFD700; color: #000; width: 90%; max-width: 440px; padding: 30px; border-radius: 30px; text-align: center; box-shadow: 0 18px 45px rgba(255, 215, 0, 0.3); }
        input { width: 88%; padding: 16px; border: 2px solid #000; border-radius: 15px; margin-top: 15px; text-align: center; font-size: 17px; }
        button { background: #000; color: #FFD700; border: none; padding: 16px; border-radius: 15px; margin-top: 25px; cursor: pointer; font-weight: bold; width: 100%; font-size: 19px; }
        #ai-reply { margin-top: 25px; font-size: 17px; font-weight: bold; line-height: 1.8; white-space: pre-wrap; }
        .footer { margin-top: auto; padding: 30px; font-size: 14px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://i.ibb.co/V9h43Wq/Al-Ezz-Cafe-Logo-V2.png" alt="شعار كافيه العز">
    </div>

    <h1>كـافـيـه الـعـز</h1>

    <div class="menu-container">
        <div class="menu-item"><span>🥤 مشروب المليون</span> <span>15 SR</span></div>
        <div class="menu-item"><span>☕ لاتيه الذكاء</span> <span>18 SR</span></div>
        <div class="menu-item"><span>🍰 كيكة الألوان</span> <span>22 SR</span></div>
    </div>

    <div class="chat-box">
        <h3>اسأل ذكاء العز 🤖</h3>
        <input type="text" id="userInput" placeholder="اكتب سؤالك واضغط Enter" onkeypress="handleKeyPress(event)">
        <button onclick="askAI()">إرسال الطلب ☕</button>
        <div id="ai-reply">يا هلا بك.. وش بخاطرك اليوم؟</div>
    </div>

    <div class="footer">جميع الحقوق محفوظة لأسرة العز © 2026</div>

<script>
    function handleKeyPress(event) { if (event.key === "Enter") { askAI(); } }

    async function askAI() {
        const inputField = document.getElementById('userInput');
        const replyDiv = document.getElementById('ai-reply');
        const userText = inputField.value;
        if (!userText) return;

        replyDiv.innerText = "⏳ ذكاء العز يجهز الرد...";
        inputField.value = "";

        try {
            // استخدام رابط الـ Test الذي أرسلته
            const response = await fetch('https://voxa-3a7ac828dfb6.herokuapp.com/webhook-test/f679c772-d169-4e46-a1cd-35bd223dc4b6', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatInput: userText })
            });

            const data = await response.json();
            
            if (data.message === "Workflow was started") {
                replyDiv.innerText = "⚠️ الموقع اتصل بـ n8n بنجاح! \n الآن اذهب لـ n8n وغير خيار Respond إلى When Last Node Finishes";
            } else {
                replyDiv.innerText = data.output || data.text || JSON.stringify(data);
            }
        } catch (error) {
            replyDiv.innerText = "❌ فشل الاتصال. تأكد أنك ضغطت زر Listen for test event في n8n";
        }
    }
</script>
</body>
</html>
