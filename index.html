<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كافيه العز</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --black: #000000; --dark: #121212; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--black); color: var(--gold); display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; min-height: 100vh; }
        h1 { font-size: 50px; margin: 20px 0; text-shadow: 0 0 15px rgba(255,215,0,0.5); }
        .hero-img { width: 100%; max-width: 600px; border-radius: 25px; border: 2px solid var(--gold); height: 300px; object-fit: cover; margin-bottom: 25px; }
        .team-box { width: 100%; max-width: 600px; background: var(--dark); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #222; margin-bottom: 25px; box-sizing: border-box; }
        .on-duty { margin-top: 10px; font-size: 14px; color: #fff; background: rgba(255, 215, 0, 0.1); padding: 6px 15px; border-radius: 25px; border: 1px solid var(--gold); display: inline-block; }
        .order-container { background: var(--gold); color: #000; width: 100%; max-width: 600px; padding: 30px; border-radius: 30px; text-align: center; box-sizing: border-box; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #000; margin-top: 15px; font-family: 'Tajawal'; font-weight: bold; text-align: center; font-size: 16px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 2; background: #000; color: var(--gold); padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 18px; }
        .btn-clear { flex: 1; background: #444; color: #fff; font-size: 14px; }
        #ai-reply-box { display: none; margin-top: 20px; padding: 20px; background: #fff; color: #000; border-radius: 20px; border: 4px solid #000; font-weight: bold; cursor: pointer; }
        .story-box { width: 100%; max-width: 600px; margin: 40px 0 20px; padding: 30px; background: var(--dark); border-radius: 20px; border: 1px solid #333; line-height: 1.8; text-align: justify; box-sizing: border-box; }
        .survey-container { width: 100%; max-width: 600px; background: var(--dark); padding: 25px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; box-sizing: border-box; margin-bottom: 30px; }
        .stars { display: flex; justify-content: center; gap: 10px; margin: 15px 0; font-size: 30px; cursor: pointer; }
        .star { color: #444; }
        .star.active { color: var(--gold); }
    </style>
</head>
<body>
    <h1>كـافـيـه الـعـز</h1>
    <img src="https://images.unsplash.com/photo-1447933601403-0c6688de566e?q=80&w=1000&auto=format&fit=crop" class="hero-img">

    <div class="team-box">
        <div style="font-weight: bold; font-size: 20px;">القائد: أبو وليد 👑 | الرئيس: أسامة ✨</div>
        <div style="font-size: 16px; color: #aaa; margin: 8px 0;">ريان • حيان • باسل</div>
        <div class="on-duty">🟢 متواجد الآن: أسامة، ريان، حيان، باسل</div>
    </div>

    <div class="order-container">
        <h3 style="margin:0">اطلب عبر ذكاء العز 🤖</h3>
        <input type="text" id="userInput" placeholder="اكتب طلبك هنا..." onkeypress="if(event.key==='Enter') askAI()">
        <div class="btn-group">
            <button onclick="askAI()">إرسال الطلب</button>
            <button class="btn-clear" onclick="resetAll()">الرجوع ↩️</button>
        </div>
        <div id="ai-reply-box" onclick="resetAll()">
            <div id="ai-text"></div>
            <div style="font-size: 10px; margin-top: 15px; color: #999;">(اضغط للمسح والرجوع)</div>
        </div>
    </div>

    <div class="story-box">
        <h2 style="text-align: center; color: var(--gold);">قصة العز 📜</h2>
        بدأت الرحلة من حلقات الصفوة، وبفضل تكاتف الفريق صمم <b>ريان</b> هذا الموقع ليكون واجهتنا الرقمية.
    </div>

    <div class="survey-container">
        <h3>تقييمك لنا يهمنا ⭐</h3>
        <div class="stars" id="starRating">
            <span class="star" onclick="rate(1)">★</span>
            <span class="star" onclick="rate(2)">★</span>
            <span class="star" onclick="rate(3)">★</span>
            <span class="star" onclick="rate(4)">★</span>
            <span class="star" onclick="rate(5)">★</span>
        </div>
        <div id="ratingMsg" style="color: var(--gold); font-weight: bold;"></div>
    </div>

    <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1000&auto=format&fit=crop" class="hero-img">

    <script>
        async function askAI() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('ai-reply-box');
            const text = document.getElementById('ai-text');
            
            if (!input.value.trim()) return;

            // الحفظ والمسح الفوري
            const currentMessage = input.value;
            input.value = ""; // تم المسح فوراً هنا
            
            box.style.display = "block";
            text.innerText = "⏳ جاري التجهيز...";

            try {
                const res = await fetch('https://voxa-3a7ac828dfb6.herokuapp.com/webhook/f679c772-d169-4e46-a1cd-35bd223dc4b6', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatInput: currentMessage })
                });
                const data = await res.json();
                text.innerText = data.output || data.text || "تم استلام طلبك!";
            } catch (e) {
                text.innerText = "أبشر، طلبك وصل!";
            }
        }

        function resetAll() {
            document.getElementById('ai-reply-box').style.display = "none";
            document.getElementById('userInput').value = "";
            document.getElementById('ai-text').innerText = "";
        }

        function rate(n) {
            const stars = document.querySelectorAll('.star');
            stars.forEach((s, i) => s.classList.toggle('active', i < n));
            document.getElementById('ratingMsg').innerText = "شكراً لتقييمك! 🔥";
        }
    </script>
</body>
</html>
