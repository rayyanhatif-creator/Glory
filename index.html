<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كافيه العز | باريستا الذكاء الاصطناعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 90%;
            max-width: 500px;
            background-color: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .header {
            background-color: #1a1a1a;
            color: #d4af37;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #d4af37;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background-color: #b8962d;
        }
        #ai-reply {
            margin-top: 20px;
            padding: 15px;
            background-color: #f9f9f9;
            border-left: 5px solid #d4af37;
            border-radius: 5px;
            min-height: 50px;
            color: #333;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h2>🤖 باريستا كافيه العز الذكي</h2>
    </div>
    
    <input type="text" id="userInput" placeholder="وش تنصحني أطلب؟">
    <button onclick="askAI()">إرسال الطلب ☕</button>

    <div id="ai-reply">يا هلا والله بك في كافيه العز، أهل الجود والكرم، كيف أقدر أخدمك؟</div>
</div>

<script>
    async function askAI() {
        const inputField = document.getElementById('userInput');
        const replyDiv = document.getElementById('ai-reply');
        const userText = inputField.value;

        if (!userText) return;

        inputField.value = "";
        replyDiv.innerText = "⏳ جاري استشارة باريستا العز...";

        try {
            const response = await fetch('https://voxa-3a7ac828dfb6.herokuapp.com/webhook-test/5fd4928d-a896-4846-bcad-853ea3ff0c65', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatInput: userText })
            });

            const data = await response.json();
            
            // هنا التعديل الجوهري: نأخذ الرد من n8n مباشرة
            replyDiv.innerText = data.output || "يا هلا بك، الباريستا بيجهز ردّه الحين..";

        } catch (error) {
            console.error("Error:", error);
            replyDiv.innerText = "عذراً، يبدو فيه مشكلة بالاتصال. جرب مرة ثانية يا بطل!";
        }
    }
</script>

</body>
</html>
