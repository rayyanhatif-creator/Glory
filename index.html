<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منيو كافيه العز الذكي 🟡</title>
    <style>
        body { background-color: #f1c40f; color: #000; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #fff; border: 3px solid #000; border-radius: 15px; padding: 15px; margin: 10px auto; max-width: 400px; font-weight: bold; }
        .ai-box { background: #000; color: #f1c40f; padding: 20px; border-radius: 20px; margin-top: 20px; }
        input { padding: 10px; border-radius: 5px; border: none; width: 70%; }
        button { padding: 10px; background: #f1c40f; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1> كافيه العز  🟡</h1>
    <div class="card">🥤 مشروب المليون - 15 SR</div>
    <div class="card">☕ لاتيه الذكاء - 18 SR</div>
    <div class="card">🍰 كيكة الألوان - 22 SR</div>
    <div class="ai-box">
        <h3>🤖 اسأل الباريستا الذكي</h3>
        <input type="text" id="ask" placeholder="وش تنصحني؟">
        <button onclick="sendToAI()">إرسال</button>
        <p id="reply"></p>
    </div>
    <script>
        async function sendToAI() {
            const msg = document.getElementById('ask').value;
            const reply = document.getElementById('reply');
            reply.innerText = "جاري التفكير...";
            try {
                const res = await fetch('هنا_تحط_الرابط_اللي_نسخته_من_n8n', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chatInput: msg })
                });
                const data = await res.json();
                reply.innerText = data.output || "اطلب المنيو كامل وما تندم!";
            } catch { reply.innerText = "الباريستا يقولك اطلب الكل!"; }
        }
    </script>
</body>
</html>
