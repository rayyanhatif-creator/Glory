<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كافيه العز</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --black: #000000; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--black); color: var(--gold); display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; min-height: 100vh; }
        
        .hero-img { width: 100%; max-width: 500px; border-radius: 20px; border: 2px solid var(--gold); height: 250px; object-fit: cover; margin-bottom: 20px; }
        
        .order-container { background: var(--gold); color: #000; width: 100%; max-width: 500px; padding: 25px; border-radius: 25px; text-align: center; box-sizing: border-box; }
        
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #000; margin-top: 15px; font-family: 'Tajawal'; font-weight: bold; text-align: center; box-sizing: border-box; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-send { flex: 2; background: #000; color: var(--gold); padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .btn-back { flex: 1; background: #444; color: #fff; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }

        /* صندوق الرد */
        #ai-reply-box { 
            display: none; /* مخفي في البداية */
            margin-top: 20px; padding: 20px; background: #fff; color: #000; 
            border-radius: 15px; border: 3px solid #000; font-weight: bold; 
        }
    </style>
</head>
<body>

    <h1 style="font-size: 40px; text-shadow: 0 0 10px rgba(255,215,0,0.5);">كـافـيـه الـعـز</h1>

    <img src="https://images.unsplash.com/photo-1447933601403-0c6688de566e?q=80&w=1000&auto=format&fit=crop" class="hero-img">

    <div class="order-container">
        <h3 style="margin:0">اطلب عبر ذكاء العز 🤖</h3>
        <input type="text" id="userInput" placeholder="اكتب طلبك هنا...">
        
        <div class="btn-group">
            <button class="btn-send" onclick="askAI()">إرسال الطلب</button>
            <button class="btn-back" onclick="goBack()">الرجوع ↩️</button>
        </div>

        <div id="ai-reply-box">
            <div id="ai-text"></div>
            <button onclick="goBack()" style="margin-top:15px; background:none; border:none; text-decoration:underline; cursor:pointer; font-size:12px;">إغلاق الرسالة</button>
        </div>
    </div>

    <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1000&auto=format&fit=crop" class="hero-img" style="margin-top:25px;">

    <script>
        // وظيفة الإرسال
        async function askAI() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('ai-reply-box');
            const text = document.getElementById('ai-text');

            if (!input.value.trim()) return;

            box.style.display = "block";
            text.innerText = "⏳ جاري التجهيز...";

            try {
                const res = await fetch('https://voxa-3a7ac828dfb6.herokuapp.com/webhook/f679c772-d169-4e46-a1cd-35bd223dc4b6', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatInput: input.value })
                });
                const data = await res.json();
                text.innerText = data.output || data.text || "أبشر طلبك وصل!";
            } catch (e) {
                text.innerText = "تم استلام طلبك يا بطل!";
            }
        }

        // وظيفة الرجوع (المسح الفوري)
        function goBack() {
            // 1. إخفاء صندوق الرد
            document.getElementById('ai-reply-box').style.display = "none";
            // 2. مسح الكلام اللي في الخانة
            document.getElementById('userInput').value = "";
            // 3. تصفير نص الرد
            document.getElementById('ai-text').innerText = "";
        }
    </script>
</body>
</html>
