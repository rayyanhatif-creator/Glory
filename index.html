<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كافيه العز</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #FFD700; 
            color: #000000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .menu-container { width: 100%; max-width: 400px; margin-bottom: 30px; }
        .menu-item { 
            background: #FFD700; padding: 15px; margin: 10px 0; 
            display: flex; justify-content: space-between; 
            border: 3px solid #000000; font-weight: bold;
        }
        .chat-box { 
            background: #000000; color: #FFD700; 
            width: 90%; max-width: 400px; padding: 20px; 
            border-radius: 15px; text-align: center; 
        }
        input { 
            width: 85%; padding: 12px; border: 2px solid #FFD700; 
            background: #000000; color: #FFD700; border-radius: 8px; 
            margin-top: 10px; text-align: center;
        }
        button { 
            background: #FFD700; color: #000000; border: none; 
            padding: 12px; border-radius: 8px; margin-top: 15px; 
            cursor: pointer; font-weight: bold; width: 100%;
        }
        #ai-reply { margin-top: 15px; font-size: 15px; font-weight: bold; line-height: 1.5; }
        .footer { margin-top: auto; padding: 20px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="border-bottom: 4px solid #000;">كـافـيـه الـعـز</h1>

    <div class="menu-container">
        <div class="menu-item"><span>مشروب المليون</span> <span>15 SR</span></div>
        <div class="menu-item"><span>لاتيه الذكاء</span> <span>18 SR</span></div>
        <div class="menu-item"><span>كيكة الألوان</span> <span>22 SR</span></div>
    </div>

    <div class="chat-box">
        <h3>اسأل ذكاء العز 🤖</h3>
        <input type="text" id="userInput" placeholder="وش تنصحني أطلب اليوم؟">
        <br>
        <button onclick="askAI()">إرسال الطلب ☕</button>
        <div id="ai-reply">أهلاً بك.. عطني سؤالك؟</div>
    </div>

    <div class="footer">جميع الحقوق محفوظة لأسرة العز © 2026</div>

<script>
    async function askAI() {
        const inputField = document.getElementById('userInput');
        const replyDiv = document.getElementById('ai-reply');
        const userText = inputField.value;
        if (!userText) return;

        replyDiv.innerText = "⏳ الباريستا قاعد يجهز الرد.. خلك معه...";
        inputField.value = "";

        try {
            const response = await fetch('https://voxa-3a7ac828dfb6.herokuapp.com/webhook/f679c772-d169-4e46-a1cd-35bd223dc4b6', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatInput: userText })
            });

            const data = await response.json();
            
            // محاولة قراءة الرد بأكثر من شكل (Array أو Object)
            let finalOutput = "";
            if (Array.isArray(data) && data[0] && data[0].output) {
                finalOutput = data[0].output;
            } else if (data && data.output) {
                finalOutput = data.output;
            }

            if (finalOutput) {
                replyDiv.innerText = finalOutput;
            } else {
                replyDiv.innerText = "خطأ ٣٣٣: n8n لم يرسل نصاً";
            }
            
        } catch (error) {
            console.error(error);
            replyDiv.innerText = "خطأ ٣٣٣: فشل في الاتصال";
        }
    }
</script>
</body>
</html>
