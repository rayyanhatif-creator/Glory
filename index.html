<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>كفي العز</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

/* 🔥 الهيرو */
.hero {
    height: 100vh;
    background: url("https://images.unsplash.com/photo-1509042239860-f550ce710b93") center/cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    font-size: 60px;
    color: yellow;
    margin: 0;
}

.hero p {
    font-size: 20px;
    margin: 10px 0 20px;
}

.hero button {
    padding: 15px 30px;
    font-size: 18px;
    background: yellow;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

/* 🤖 الذكاء */
#ai {
    padding: 40px 20px;
    background: #111;
    text-align: center;
}

#ai h2 {
    color: yellow;
}

#chat {
    height: 250px;
    overflow-y: auto;
    border: 1px solid yellow;
    margin: 20px auto;
    max-width: 600px;
    padding: 10px;
    border-radius: 10px;
}

.message {
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 70%;
}

.user {
    background: yellow;
    color: black;
    margin-left: auto;
}

.bot {
    background: #222;
    border: 1px solid yellow;
}

#inputArea {
    display: flex;
    max-width: 600px;
    margin: auto;
}

#inputArea input {
    flex: 1;
    padding: 12px;
    border: none;
}

#inputArea button {
    padding: 12px 20px;
    background: yellow;
    border: none;
    font-weight: bold;
}

/* ☕ المنتجات */
#products {
    padding: 40px 20px;
}

.product {
    display: flex;
    align-items: center;
    gap: 15px;
    background: #111;
    margin-bottom: 15px;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #333;
    transition: 0.3s;
}

.product:hover {
    border-color: yellow;
    transform: scale(1.02);
}

.product img {
    width: 80px;
    border-radius: 10px;
}

footer {
    text-align: center;
    padding: 15px;
    font-size: 12px;
    color: gray;
}
</style>

</head>
<body>

<!-- 🔥 واجهة قوية -->
<div class="hero">
    <h1>☕ كفي العز</h1>
    <p>قهوة بطابع مختلف</p>
    <button onclick="document.getElementById('ai').scrollIntoView({behavior:'smooth'})">
        ابدأ
    </button>
</div>

<!-- 🤖 ذكاء العز -->
<div id="ai">
    <h2>🤖 ذكاء العز</h2>

    <div id="chat"></div>

    <div id="inputArea">
        <input id="input" placeholder="اسأل عن القهوة...">
        <button onclick="send()">إرسال</button>
    </div>
</div>

<!-- ☕ المنتجات -->
<div id="products">

    <div class="product">
        <img src="https://via.placeholder.com/80">
        <div>
            <h3>لاتيه</h3>
            <p>12 ريال</p>
        </div>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/80">
        <div>
            <h3>كابتشينو</h3>
            <p>10 ريال</p>
        </div>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/80">
        <div>
            <h3>آيس كوفي</h3>
            <p>14 ريال</p>
        </div>
    </div>

</div>

<footer>
جميع الحقوق محفوظة لأسرة العز
</footer>

<script>
function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
    div.scrollIntoView();
}

function send() {
    const input = document.getElementById("input");
    const text = input.value;
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    fetch("https://voxa-3a7ac828dfb6.herokuapp.com/webhook-test/5fd4928d-a896-4846-bcad-853ea3ff0c65", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
    })
    .then(res => res.json())
    .then(data => {
        addMessage(data.reply || "تم الرد 👍", "bot");
    })
    .catch(() => {
        addMessage("❌ خطأ في السيرفر", "bot");
    });
}
</script>

</body>
</html>
