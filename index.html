<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كافيه العز | الحل النهائي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --black: #000000; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--black); color: var(--gold); display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; min-height: 100vh; }
        h1 { font-size: 50px; margin: 20px 0; text-shadow: 0 0 15px rgba(255,215,0,0.5); }
        .hero-img { width: 100%; max-width: 600px; border-radius: 25px; border: 2px solid var(--gold); object-fit: cover; height: 300px; margin-bottom: 25px; }
        .order-container { background: var(--gold); color: #000; width: 100%; max-width: 600px; padding: 30px; border-radius: 30px; margin-top: 30px; text-align: center; box-sizing: border-box; position: relative; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #000; margin-top: 15px; font-family: 'Tajawal'; font-weight: bold; text-align: center; font-size: 16px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 2; background: #000; color: var(--gold); padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 18px; }
        .btn-clear { flex: 1; background: #333; color: #fff; font-size: 14px; }
        
        /* صندوق الرد - خليته أوضح */
        #ai-reply-box { 
            display: none; margin-top: 20px; padding: 20px; 
            background: #fff; color: #000; border-radius: 20px; 
            font-weight: bold; border: 4px solid #000;
        }
    </style>
</head>
<body>

    <h1>كـافـيـه الـعـز</h1>

    <img src="https://images.unsplash.com/photo-1447933601403-0c6688de566e?q=80&w=1000&auto=format&fit=crop" class="hero-img">

    <div class="order-container">
        <h3 style="margin:0; font-size: 24px;">اطلب عبر ذكاء العز 🤖</h3>
        
        <input type="text" id="userInput" placeholder="اكتب طلبك هنا...">
        
        <div class="btn-group">
            <button onclick="askAI()">إرسال الطلب</button>
            <button type="button" class="btn-clear" onclick="forceReset()">الرجوع ↩️</button>
        </div>

        <div id="ai-reply-box" onclick="forceReset()">
            <div id="ai-text"></div>
            <div style="font-size: 10px; margin-top: 10px; color: #777;">(اضغط هنا للرجوع والمسح)</div>
        </div>
    </div>

    <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1000&auto=format&fit=crop" class="hero-img" style="margin-top:30px;">

    <script>
        async function askAI() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('ai-reply-box');
            const txt = document.getElementById('ai-text');

            if (!input.value.trim()) return;

            // إظهار الصندوق فوراً
            box.style.display = "block";
            txt.innerText = "⏳ جاري التجهيز...";

            try {
                const response = await fetch('https://voxa-3a7ac828dfb6.herokuapp.com/webhook/f679c772-d169-4e46-a1cd-35bd223dc4b6', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatInput: input.value })
                });
                const data = await response.json();
                txt.innerText = data.output || data.text || "تم استلام طلبك!";
            } catch (e) {
                txt.innerText = "أبشر، طلبك وصل!";
            }
        }

        // وظيفة الإجبار على المسح والرجوع
        function forceReset() {
            // إخفاء الصندوق
            document.getElementById('ai-reply-box').style.display = "none";
            // مسح النص في خانة الكتابة
            document.getElementById('userInput').value = "";
            // مسح نص الرد تماماً
            document.getElementById('ai-text').innerText = "";
            console.log("تمت عملية الرجوع بنجاح");
        }
    </script>
</body>
</html>
