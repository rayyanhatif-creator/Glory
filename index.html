<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كافيه العز الفاخر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #000000; /* خلفية سوداء ملكية */
            color: #FFD700; /* كلام ذهبي ملكي */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        /* تنسيق الشعار الملكي */
        .logo-container {
            margin-top: 30px;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .logo-container img {
            width: 100%;
            border-radius: 50%; /* شكل دائري فخم */
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3); /* توهج ذهبي خفيف */
        }

        h1 {
            color: #FFD700;
            border-bottom: 2px solid #FFD700;
            padding-bottom: 15px;
            margin-bottom: 40px;
            font-size: 28px;
        }

        .menu-container { width: 100%; max-width: 400px; margin-bottom: 40px; }
        .menu-item { 
            background: #111; /* خلفية قائمة داكنة */
            padding: 18px; 
            margin: 12px 0; 
            display: flex; 
            justify-content: space-between; 
            border: 1px solid #FFD700; 
            font-weight: bold;
            border-radius: 12px;
            font-size: 17px;
        }

        /* تنسيق صندوق المحادثة الذهبي */
        .chat-box { 
            background: #FFD700; /* صندوق المحادثة ذهبي */
            color: #000000; /* الكلام داخل الصندوق أسود */
            width: 90%; 
            max-width: 420px; 
            padding: 25px; 
            border-radius: 25px; 
            text-align: center; 
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.25);
        }

        h3 {
            margin-top: 0;
            font-size: 20px;
            margin-bottom: 20px;
        }

        /* تنسيق حقل الإدخال */
        input { 
            width: 88%; 
            padding: 14px; 
            border: 2px solid #000; 
            background: #fff; 
            color: #000; 
            border-radius: 12px; 
            margin-top: 15px; 
            text-align: center;
            font-size: 16px;
        }

        /* تنسيق زر الإرسال */
        button { 
            background: #000000; /* زر أسود فخم */
            color: #FFD700; /* كلام ذهبي على الزر */
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            margin-top: 20px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%;
            font-size: 18px;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #222; /* تأثير خفيف عند تمرير الماوس */
        }

        #ai-reply { 
            margin-top: 20px; 
            font-size: 16px; 
            font-weight: bold; 
            line-height: 1.7; 
            color: #000; /* رد الذكاء بالأسود داخل الصندوق الذهبي */
            white-space: pre-wrap; /* للحفاظ على تنسيق الأسطر */
        }

        .footer { margin-top: auto; padding: 25px; font-size: 13px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://i.ibb.co/L5SgWvK/Al-Ezz-Cafe-Logo.png" alt="شعار كافيه العز الفاخر">
    </div>

    <h1>كـافـيـه الـعـز</h1>

    <div class="menu-container">
        <div class="menu-item"><span>🥤 مشروب المليون</span> <span>15 SR</span></div>
        <div class="menu-item"><span>☕ لاتيه الذكاء</span> <span>18 SR</span></div>
        <div class="menu-item"><span>🍰 كيكة الألوان</span> <span>22 SR</span></div>
    </div>

    <div class="chat-box">
        <h3>اسأل ذكاء العز 🤖</h3>
        <input type="text" id="userInput" placeholder="اكتب سؤالك واضغط Enter" onkeypress="handleKeyPress(event)">
        <button onclick="askAI()">إرسال الطلب ☕</button>
        <div id="ai-reply">يا هلا بك.. وش بخاطرك اليوم؟</div>
    </div>

    <div class="footer">جميع الحقوق محفوظة لأسرة العز © 2026</div>

<script>
    // وظيفة لإرسال الرسالة عند الضغط على زر Enter
    function handleKeyPress(event) {
        if (event.key === "Enter") {
            askAI();
        }
    }

    async function askAI() {
        const inputField = document.getElementById('userInput');
        const replyDiv = document.getElementById('ai-reply');
        const userText = inputField.value;
        if (!userText) return;

        replyDiv.innerText = "⏳ ذكاء العز يجهز الرد الفخم...";
        inputField.value = "";

        try {
            const response = await fetch('https://voxa-3a7ac828dfb6.herokuapp.com/webhook-test/f679c772-d169-4e46-a1cd-35bd223dc4b6', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatInput: userText })
            });

            if (!response.ok) throw new Error('Network response was not ok');

            const data = await response.json();
            
            // قراءة الرد من n8n
            let output = "";
            if (Array.isArray(data)) {
                output = data[0].output || data[0].text || "آمرنا؟ جرب تسأل مرة ثانية";
            } else {
                output = data.output || data.text || "آمرنا؟ جرب تسأل مرة ثانية";
            }

            replyDiv.innerText = output;

        } catch (error) {
            console.error(error);
            replyDiv.innerText = "خطأ في الاتصال.. تأكد أن n8n Active والمفتاح أخضر";
        }
    }
</script>
</body>
</html>
