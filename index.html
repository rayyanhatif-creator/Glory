<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كافيه العز | أبطال الكيف</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --black: #000000; --card: #0e0e0e; }
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--black); 
            color: var(--gold); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 10px;
        }

        .header-section { text-align: center; margin: 30px 0; }
        .header-section h1 { font-size: 48px; margin: 0; text-shadow: 0 0 15px rgba(255,215,0,0.4); }

        /* الصورة الفخمة مدمجة مع رابط الطلب */
        .hero-box {
            width: 100%;
            max-width: 480px;
            cursor: pointer;
            position: relative;
        }
        .hero-img {
            width: 100%;
            height: 280px;
            border-radius: 25px;
            border: 2px solid var(--gold);
            object-fit: cover;
            box-shadow: 0 0 30px rgba(255,215,0,0.1);
        }

        /* فريق العمل - ترتيب الهيبة */
        .team-box {
            width: 100%;
            max-width: 480px;
            margin-top: 25px;
            background: var(--card);
            border: 1px solid #222;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .team-title { font-size: 20px; color: #fff; margin-bottom: 15px; border-bottom: 1px solid var(--gold); padding-bottom: 5px; }
        .leaders { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .leader-item { font-weight: 700; color: var(--gold); font-size: 19px; }
        .members { display: flex; justify-content: center; gap: 20px; font-size: 16px; color: #ccc; }

        /* المنيو */
        .menu-list { width: 100%; max-width: 480px; margin-top: 20px; }
        .menu-item { 
            background: #080808; 
            padding: 15px 20px; 
            margin: 10px 0; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; 
            border-right: 4px solid var(--gold);
            font-weight: bold;
        }

        /* صندوق اطلب من العز */
        .order-container {
            background: var(--gold);
            color: #000;
            width: 100%;
            max-width: 480px;
            padding: 30px;
            border-radius: 30px;
            margin-top: 30px;
            box-sizing: border-box;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #000;
            margin-top: 15px;
            box-sizing: border-box;
            font-family: 'Tajawal';
            font-weight: 700;
            text-align: center;
        }
        button {
            background: #000;
            color: var(--gold);
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            margin-top: 15px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }

        #ai-reply { margin-top: 20px; font-weight: 700; line-height: 1.6; }
        
        .music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body onclick="startExperience()">

    <audio id="alazzSong" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="header-section">
        <h1>كافيه العز</h1>
    </div>

    <div class="hero-box" onclick="document.getElementById('userInput').focus()">
        <img src="https://images.unsplash.com/photo-1447933601403-0c6688de566e?q=80&w=1000&auto=format&fit=crop" class="hero-img" alt="قهوة العز الملكية">
    </div>

    <div class="team-box">
        <div class="team-title">فريق إدارة العز 🛡️</div>
        <div class="leaders">
            <div class="leader-item">القائد: أبو وليد 👑</div>
            <div class="leader-item">الرئيس: أسامة ✨</div>
        </div>
        <div class="members">
            <span>ريان ⚡</span>
            <span>حيان 🔥</span>
            <span>باسل 🦾</span>
        </div>
    </div>

    <div class="menu-list">
        <div class="menu-item"><span>🥤 مشروب المليون</span> <span>15 SR</span></div>
        <div class="menu-item"><span>☕ لاتيه الذكاء</span> <span>18 SR</span></div>
        <div class="menu-item"><span>🍰 كيكة الألوان</span> <span>22 SR</span></div>
    </div>

    <div class="order-container">
        <h3 style="margin:0">اطلب من العز ☕✨</h3>
        <input type="text" id="userInput" placeholder="وش اللي بخاطرك يابطل؟" onkeypress="if(event.key==='Enter') askAI()">
        <button onclick="askAI()">إرسال الطلب</button>
        <div id="ai-reply">أبشر بسعدك.. فريق العز بخدمتك! 🤩</div>
    </div>

    <div style="margin-top:40px; font-size:10px; opacity:0.3;">كافيه العز © 2026</div>

    <script>
        // تشغيل الأنشودة عند أول لمسة للموقع
        function startExperience() {
            var audio = document.getElementById("alazzSong");
            audio.play();
        }

        async function askAI() {
            const input = document.getElementById('userInput');
            const reply = document.getElementById('ai-reply');
            if (!input.value) return;

            reply.innerText = "⏳ جاري تجهيز طلبك الفخم...";
            const text = input.value;
            input.value = "";

            try {
                const res = await fetch('https://voxa-3a7ac828dfb6.herokuapp.com/webhook/f679c772-d169-4e46-a1cd-35bd223dc4b6', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatInput: text })
                });
                const data = await res.json();
                reply.innerText = data.output || data.text || "آمرنا؟ جرب مرة ثانية";
            } catch (e) {
                reply.innerText = "❌ الباريستا مشغول بالتحضير، ثواني وارجع لنا!";
            }
        }
    </script>
</body>
</html>
