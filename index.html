<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Elite Hunt Engine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;700&display=swap');
        body { margin: 0; background: #050505; color: #fff; font-family: 'Tajawal', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 40px; width: 320px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        input, select { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; border: none; background: rgba(255,255,255,0.05); color: #00f2ff; text-align: center; box-sizing: border-box; }
        button { background: #00f2ff; color: #000; padding: 15px; border-radius: 12px; border: none; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="glass" id="app">
    <div id="intro">
        <h1>Elite Challenge</h1>
        <p>نظام ذكي لتحدي الفرق. 4 أسئلة لكل مرحلة، تليها شفرة سرية.</p>
        <select id="team"><option>الفريق الأول</option><option>الفريق الثاني</option><option>الفريق الثالث</option></select>
        <button onclick="startGame()">بدء المسابقة</button>
    </div>

    <div id="game" class="hidden">
        <h3 id="display-area">جاري التواصل مع المحرك...</h3>
        <input type="text" id="user-input" placeholder="الإجابة أو الشفرة...">
        <button id="main-btn" onclick="sendAction()">تأكيد</button>
    </div>
</div>

<script>
    const WEBHOOK = "https://voxa-3a7ac828dfb6.herokuapp.com/webhook/46a95cc8-6b1e-4889-8dc2-2b882a27c9ef";
    let state = { action: 'getQ', team: '' };

    async function startGame() {
        state.team = document.getElementById('team').value;
        document.getElementById('intro').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
        sendAction();
    }

    async function sendAction() {
        const val = document.getElementById('user-input').value;
        const payload = { action: state.action, team: state.team, input: val };
        
        const res = await fetch(WEBHOOK, { method: 'POST', body: JSON.stringify(payload) });
        const data = await res.json();
        
        // n8n سيرد بالمنطق التالي:
        document.getElementById('display-area').innerText = data.message;
        state.action = data.nextAction; // المحرك هو من يقرر الخطوة القادمة
        document.getElementById('user-input').value = '';
    }
</script>
</body>
</html>
